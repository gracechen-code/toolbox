<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码生成 - 工具箱</title>
    <link rel="stylesheet" href="../css/style.css?v=7">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="page-header">
            <a href="../index.html" class="back-btn">←</a>
            <h2>📱 二维码生成</h2>
        </header>

        <div class="card">
            <h3 style="margin-bottom: 12px; color: var(--text-secondary);">选择字段</h3>
            <div class="btn-group" id="presetBtns">
                <button class="btn btn-outline preset-btn" data-field="Wi-Fi_SSID">Wi-Fi_SSID</button>
                <button class="btn btn-outline preset-btn" data-field="Wi-Fi_PWD">Wi-Fi_PWD</button>
                <button class="btn btn-outline preset-btn" data-field="Volumn">Volumn</button>
            </div>
            <div style="display: flex; gap: 8px; margin-top: 12px;">
                <input type="text" class="input" id="customFieldInput" placeholder="自定义字段名" style="flex: 1;">
                <button class="btn btn-outline" id="addCustomFieldBtn">添加</button>
            </div>
        </div>

        <div class="card" style="margin-top: 16px;">
            <h3 style="margin-bottom: 12px; color: var(--text-secondary);">已选字段</h3>
            <div id="selectedFields">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <p>点击上方按钮添加字段</p>
                </div>
            </div>
        </div>

        <div class="btn-group" style="margin: 16px 0;">
            <button class="btn btn-primary" id="generateBtn">生成二维码</button>
        </div>

        <div class="card" id="qrCard" style="display: none; text-align: center;">
            <div id="qrcode" style="display: inline-block;"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="../js/qrcode.js?v=7"></script>
</body>
</html>
