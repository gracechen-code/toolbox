<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品管理 - 工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <a href="../index.html" class="back-btn">←</a>
            <h2>📦 物品管理</h2>
        </header>

        <div class="sync-bar">
            <button class="btn btn-outline" id="exportBtn">📤 导出</button>
            <button class="btn btn-outline" id="importBtn">📥 导入</button>
            <button class="btn btn-outline" id="syncBtn">☁️ 云端同步</button>
        </div>

        <div class="filter-bar">
            <input type="text" class="input" id="searchInput" placeholder="搜索物品...">
            <select id="filterCategory">
                <option value="">全部分类</option>
            </select>
            <button class="btn btn-primary" id="addBtn">+ 添加</button>
        </div>

        <div class="card">
            <div id="inventoryList">
                <div class="empty-state">
                    <div class="empty-state-icon">📦</div>
                    <p>暂无物品，点击上方"添加"开始</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="itemModal">
        <div class="modal">
            <h3 id="modalTitle">添加物品</h3>
            <input type="hidden" id="editId">
            <div class="input-group">
                <label>名称 *</label>
                <input type="text" class="input" id="itemName" placeholder="物品名称">
            </div>
            <div class="input-group">
                <label>数量</label>
                <input type="number" class="input" id="itemQuantity" min="0" value="1">
            </div>
            <div class="input-group">
                <label>位置</label>
                <input type="text" class="input" id="itemLocation" placeholder="存放位置">
            </div>
            <div class="input-group">
                <label>分类</label>
                <input type="text" class="input" id="itemCategory" placeholder="例如：电子产品、文具">
            </div>
            <div class="input-group">
                <label>备注</label>
                <textarea class="textarea" id="itemNote" placeholder="备注信息" style="min-height: 80px;"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" id="cancelModal">取消</button>
                <button class="btn btn-primary" id="saveModal">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <h3>导入数据</h3>
            <div class="input-group">
                <label>粘贴 JSON 数据</label>
                <textarea class="textarea" id="importData" placeholder='[{"name":"物品1","quantity":1,...}]'></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" id="cancelImport">取消</button>
                <button class="btn btn-primary" id="confirmImport">导入</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="syncModal">
        <div class="modal">
            <h3>云端同步设置</h3>
            <div class="input-group">
                <label>JSONBin.io API Key</label>
                <input type="password" class="input" id="apiKey" placeholder="输入你的 API Key">
            </div>
            <div class="input-group">
                <label>Bin ID（首次同步留空）</label>
                <input type="text" class="input" id="binId" placeholder="首次同步后自动保存">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" id="cancelSync">取消</button>
                <button class="btn btn-success" id="uploadSync">上传到云端</button>
                <button class="btn btn-warning" id="downloadSync">从云端下载</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="../js/inventory.js"></script>
</body>
</html>
